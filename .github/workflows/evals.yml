name: Evals

on:
  pull_request:
    branches:
      - master

jobs:
  evals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run evals
        id: evals
        env:
          OPENAI_GH_TOKEN: ${{ secrets.OPENAI_GH_TOKEN }}
          MODEL: ${{ secrets.MODEL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LANGCHAIN_TRACING_V2: "false"
        run: |
          uv run pytest tests/evals/ -v --tb=short

      - name: Re-run evals with tracing on failure
        if: failure()
        env:
          OPENAI_GH_TOKEN: ${{ secrets.OPENAI_GH_TOKEN }}
          MODEL: ${{ secrets.MODEL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_PROJECT: "macro_advisor_ci"
        run: |
          uv run pytest tests/evals/ -v --tb=short